<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exit Intelligence Tool (Demo)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Exit Intelligence Dashboard (Demo)</h1>

    <section class="upload-section">
        <h2>Upload Files</h2>

        <div>
            <label>Exit File (Required):</label>
            <input type="file" id="exitFile" accept=".csv">
        </div>

        <div>
            <label>Headcount File (Optional):</label>
            <input type="file" id="headcountFile" accept=".csv">
        </div>

        <button id="processBtn">Process Data</button>
    </section>

    <section id="statusSection">
        <h2>Status</h2>
        <div id="statusOutput">No files processed yet.</div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
